services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: face-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://root:@host.docker.internal:3306/face_recognition
      FACE_API_KEY: F4c3Ap1K3yAng3LSu1C!d3
      FACE_DATA_DIR: data
      FACE_TOLERANCE: "0.42"
      FACE_MIN_PHOTOS: "6"
      FACE_MAX_PHOTO_MB: "10"
      FACE_MIN_QUALITY_SCORE: "35"
    ports:
      - "3062:8000"
    volumes:
      - ./data:/app/data